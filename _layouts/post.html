<!DOCTYPE html>
<html>
  {% include head.html %}
  <body>
    <main>
      <p class="post-meta">
        <a href="/journal/">Journal</a> ·
        <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
      </p>
      <h1 class="page-title">{{ page.title }}</h1>
      {{ content }}
    </main>
  </body>
</html>
