---
layout: page
title: Journal
---

<p class="post-meta"><a href="/">Joel Bond</a></p>

<ul class="post-list">
  {% for post in site.posts %}
  <li>
    <a href="{{ post.url }}">{{ post.title }}</a>
    <time class="post-date" datetime="{{ post.date | date_to_xmlschema }}">{{ post.date | date: "%b %-d, %Y" }}</time>
  </li>
  {% endfor %}
</ul>
